name: CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  validate-staging:
    name: Validate Staging YAML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yamllint
        run: sudo apt-get update && sudo apt-get install -y yamllint

      - name: Validate YAML files
        run: yamllint k8s/staging/

  validate-production:
    name: Validate Production YAML
    needs: validate-staging
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yamllint
        run: sudo apt-get update && sudo apt-get install -y yamllint

      - name: Validate YAML files
        run: yamllint k8s/production/
