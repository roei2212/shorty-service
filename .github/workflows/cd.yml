name: CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  deploy-staging:
    name: Validate Staging Manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Validate manifests locally (no kubeconfig, no cluster)
        run: kubectl create --dry-run=client --validate=false -f k8s/staging/

  deploy-production:
    name: Validate Production Manifests
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Validate manifests locally (no kubeconfig, no cluster)
        run: kubectl create --dry-run=client --validate=false -f k8s/production/
