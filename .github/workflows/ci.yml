name: CI Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint
        run: flake8 app

      - name: Run tests
        run: pytest -q

      - name: Build Docker image
        run: docker build -t shorty-service:${{ github.sha }} .

      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: Push image
        run: |
          docker tag shorty-service:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/shorty-service:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/shorty-service:${{ github.sha }}
