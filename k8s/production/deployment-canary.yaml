apiVersion: apps/v1
kind: Deployment
metadata:
  name: shorty-service-canary
  labels:
    app: shorty-service
    version: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shorty-service
      version: canary
  template:
    metadata:
      labels:
        app: shorty-service
        version: canary
    spec:
      containers:
        - name: shorty-service
          image: ghcr.io/roei2212/shorty-service:latest
          ports:
            - containerPort: 8000
          env:
            - name: ENV
              value: "production"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
