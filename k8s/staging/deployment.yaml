apiVersion: apps/v1
kind: Deployment
metadata:
  name: shorty-service
  labels:
    app: shorty-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shorty-service
  template:
    metadata:
      labels:
        app: shorty-service
    spec:
      containers:
        - name: shorty-service
          image: ghcr.io/roei2212/shorty-service:latest
          ports:
            - containerPort: 8000
          env:
            - name: ENV
              value: "staging"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
